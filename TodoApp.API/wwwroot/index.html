<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Tasks</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app-container">
        <!-- Auth Section -->
        <div id="auth-section" class="glass-panel active">
            <h1>Welcome to <span>Tasks</span></h1>
            <p>Your secure, elegant task manager.</p>
            <div class="tabs">
                <button class="tab-btn active" onclick="switchAuthTab('login')">Login</button>
                <button class="tab-btn" onclick="switchAuthTab('register')">Register</button>
            </div>
            
            <form id="auth-form" onsubmit="handleAuth(event)">
                <input type="text" id="username" placeholder="Username" required>
                <input type="email" id="email" placeholder="Email (only for register)" style="display:none;">
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" class="btn-primary" id="auth-submit">Login</button>
                <div id="auth-error" class="error-msg"></div>
            </form>
        </div>

        <!-- Todo Section -->
        <div id="todo-section" class="glass-panel" style="display: none;">
            <div class="header">
                <h2>Hello, <span id="user-display"></span></h2>
                <button class="btn-icon" onclick="logout()">Logout</button>
            </div>
            
            <form id="todo-form" onsubmit="createTodo(event)">
                <div class="input-group">
                    <input type="text" id="todo-title" placeholder="What needs to be done?" required>
                    <button type="submit" class="btn-primary">Add</button>
                </div>
                <input type="text" id="todo-desc" placeholder="Details (optional)" class="sub-input">
            </form>

            <div class="todo-list" id="todo-list">
                <!-- Todos will be injected here -->
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
